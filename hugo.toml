baseURL = 'https://example.org/'
locale = 'en-us'
title = '775 Lab'
theme = 'risotto'
author = "Joe Roe"
copyright = "© Lucas Adler"
languageCode = "en"
DefaultContentLanguage = "en"
enableInlineShortcodes = true
# prevent build failures when using Hugo's Instagram shortcode due to deprecated Instagram API.
# See https://github.com/gohugoio/hugo/issues/7228#issuecomment-714490456
ignoreErrors = ["error-remote-getjson"]

# Automatically add content sections to main menu
sectionPagesMenu = "main"

[pagination]
pagerSize = 3

[params]
noindex = false

[params.theme]
palette = "solarized-light"

# Sidebar: about/bio
[params.about]
title = "Lucas Adler"
description = "Minhas produções"
# unicode/emoji logo:
logo = "🍚"
# or use an image:
#logo_image = "images/rice.svg"

# Sidebar: social links
# Available icon sets:
# * FontAwesome 6 <https://fontawesome.com/> ('fa-brands', 'fa-normal', or 'fa-solid' for brands)
# * Academicons <https://jpswalsh.github.io/academicons> ('ai ai-')

[[params.socialLinks]]
icon = "ai ai-lattes"
title = "Lattes"
url = "https://lattes.cnpq.br/0187477565595889"

[[params.socialLinks]]
icon = "fa-solid fa-envelope"
title = "Email"
url = "mailto:procheira.lucas@gmail.com"

[[params.socialLinks]]
icon = "ai ai-orcid"
title = "ORCID"
url = "https://orcid.org/0000-0003-1166-2336"


[menu]

  [[menu.main]]
    identifier = "about"
    name = "Sobre"
    url = "/about/"
    weight = 10

  [[menu.main]]
    identifier = "Apps"
    name = "Apps"
    url = "/apps/"
    weight = 15

[[menu.main]]
    identifier = "Publicações"
    name = "Publicações"
    url = "/publicações/"
    weight = 15

[taxonomies]
category = "categories"
tag = "tags"
series = "series"

# For hugo >= 0.60.0, enable inline HTML
[markup.goldmark.renderer]
unsafe = true

[markup]

  # Table of contents
  # Add toc = true to content front matter to enable
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 3
    ordered    = true

[privacy]

  [privacy.vimeo]
    disabled = false
    simple = true

  [privacy.instagram]
    disabled = false
    simple = true

  [privacy.youtube]
    disabled = false
    privacyEnhanced = true

[services]

  [services.instagram]
    disableInlineCSS = true

[caches]
  [caches.images]
    dir = ':cacheDir/images'
